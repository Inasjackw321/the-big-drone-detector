name: Update map data

# Fetches new posts from @radarrussiia, extracts sightings via OpenRouter,
# geocodes them, and commits the result to docs/data/sightings.json so the
# GitHub Pages site stays live.
#
# Requires secret: OPENROUTER_API_KEY (add at repo Settings → Secrets → Actions)

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:           # manual trigger from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Fetch and update sightings
        run: node scripts/update-map.js
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_CHANNEL: radarrussiia
          DDX_RETENTION_HOURS: '48'

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/sightings.json
          if git diff --staged --quiet; then
            echo "No new sightings — skipping commit"
          else
            git commit -m "chore: update sightings [skip ci]"
            git push
          fi
