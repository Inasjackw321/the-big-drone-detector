name: Update map data

# Fetches new posts from @radarrussiia, @kpszsu and @lpr1_treugolnik, extracts
# sightings via OpenRouter, geocodes them, and commits the result to
# docs/data/sightings.json so the GitHub Pages site stays live.
#
# Requires secret: OPENROUTER_API_KEY (add at repo Settings → Secrets → Actions)

on:
  schedule:
    - cron: '*/5 * * * *'    # every 5 minutes (GitHub's practical minimum)
  workflow_dispatch:           # manual trigger from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

# Never let a scheduled run and a manual "Run workflow" push at the same time —
# queue them instead so the commit/push step can't collide.
concurrency:
  group: update-map
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Fetch and update sightings
        run: node scripts/update-map.js
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_CHANNELS: radarrussiia,kpszsu,lpr1_treugolnik,locatorru
          DDX_RETENTION_HOURS: '1'
          DDX_HISTORY_HOURS: '12'

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
            exit 0
          fi
          git commit -m "chore: update sightings [skip ci]"
          # Push with rebase-and-retry so a concurrent scheduled run can't make
          # this fail with a non-fast-forward error.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "pushed on attempt $attempt"
              exit 0
            fi
            echo "push failed (attempt $attempt) — rebasing on latest main and retrying"
            git pull --rebase --autostash origin main || true
            sleep $((attempt * 3))
          done
          echo "::error::could not push sightings update after 5 attempts"
          exit 1
