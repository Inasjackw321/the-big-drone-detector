name: Build Windows app

# Produces a one-click Windows installer (.exe) and a portable .exe.
# Run it from the GitHub "Actions" tab (Run workflow), or it runs automatically
# when you push a version tag like v1.0.0 (which also creates a Release).

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate icon
        run: npm run icon

      - name: Run tests
        run: npm test

      - name: Build Windows installer + portable
        run: npm run dist:win
        env:
          # No code-signing certificate — produce unsigned builds.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: |
            dist/*.exe
          if-no-files-found: error

      - name: Attach to release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
