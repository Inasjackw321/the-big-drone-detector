<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Big Drone Detector</title>
    <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; background: #0d1b2a; }
      #map { position: absolute; inset: 0; }

      /* dark popups */
      .leaflet-popup-content-wrapper {
        background: #1a2d42; color: #e0eaf5; border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.6); border: 1px solid #2d4a6a;
      }
      .leaflet-popup-tip { background: #1a2d42; }
      .leaflet-popup-content { margin: 12px 14px; font-size: 13px; line-height: 1.5; }
      .popup-title { font-size: 14px; font-weight: 700; margin-bottom: 5px; color: #fff; }
      .popup-meta  { color: #8ab0d0; font-size: 12px; margin-bottom: 3px; }
      .popup-status { font-size: 12px; font-weight: 700; margin-bottom: 3px; }
      .popup-acc   { color: #6f93b4; font-size: 11px; margin-bottom: 3px; }
      .popup-dest  { color: #ffd27f; font-size: 12px; margin-bottom: 3px; }
      .popup-alert { color: #ff9f3d; font-size: 12px; font-weight: 600; margin-bottom: 3px; }
      .popup-text  {
        font-size: 12px; max-height: 75px; overflow-y: auto; white-space: pre-wrap;
        border-top: 1px solid #2d4a6a; padding-top: 6px; margin-top: 6px; color: #c0d8ee;
      }
      .popup-link  { margin-top: 7px; }
      .popup-link a { color: #5aafff; font-size: 12px; text-decoration: none; }
      .popup-link a:hover { text-decoration: underline; }

      /* title bar */
      .bar {
        position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
        z-index: 1000; background: rgba(13,27,42,0.88); color: #cde0f5;
        padding: 8px 18px; border-radius: 24px; border: 1px solid #2d4a6a;
        box-shadow: 0 2px 12px rgba(0,0,0,0.5); font-size: 13px; white-space: nowrap;
        backdrop-filter: blur(6px); font-family: -apple-system,"Segoe UI",Arial,sans-serif;
      }
      .bar b { color: #fff; }
      .bar a { color: #5aafff; text-decoration: none; }
      .bar a:hover { text-decoration: underline; }
      .bar .dot {
        display: inline-block; width: 7px; height: 7px; border-radius: 50%;
        background: #3fd87f; margin-right: 5px; vertical-align: middle;
        animation: blink 2s ease-in-out infinite;
      }
      @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

      .threat-icon, .arrow-icon { background: none; border: none; }
      .threat-icon svg { overflow: visible; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.7)); }
      .arrow-icon svg { overflow: visible; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.6)); }
      .threat-icon .pulse { animation: ping 2.4s ease-out infinite; transform-origin: center; }
      .threat-icon .pulse-alert { animation: ping-alert 2s ease-out infinite; transform-origin: center; }
      .threat-icon .rotor { animation: spin 3s linear infinite; transform-origin: center; transform-box: fill-box; }
      @keyframes ping { 0% { opacity: 0.5; } 70%,100% { opacity: 0; transform: scale(2.4); } }
      @keyframes ping-alert { 0% { opacity: 0.6; } 70%,100% { opacity: 0; transform: scale(1.8); } }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

      /* warnings panel */
      .warn-panel {
        position: absolute; top: 56px; left: 12px; z-index: 1000; width: 244px;
        max-height: 62vh; display: none; overflow: hidden;
        background: rgba(13,27,42,0.92); border: 1px solid #2d4a6a; border-radius: 12px;
        box-shadow: 0 4px 18px rgba(0,0,0,0.5); backdrop-filter: blur(6px);
        font-family: -apple-system,"Segoe UI",Arial,sans-serif; color: #cde0f5;
      }
      .warn-panel.danger { border-color: #ff3b3b; box-shadow: 0 0 0 1px #ff3b3b, 0 6px 20px rgba(0,0,0,0.55); }
      .warn-head {
        padding: 9px 12px; font-size: 13px; font-weight: 700; color: #fff;
        border-bottom: 1px solid #2d4a6a; display: flex; align-items: center; gap: 7px;
      }
      .warn-head .wdot { width: 9px; height: 9px; border-radius: 50%; background: #ff7a3d; }
      .warn-panel.danger .warn-head .wdot { background: #ff3b3b; animation: blink 1s ease-in-out infinite; }
      .warn-list { overflow-y: auto; max-height: calc(62vh - 40px); }
      .warn-item {
        padding: 8px 12px; border-bottom: 1px solid rgba(45,74,106,0.5);
        cursor: pointer; display: flex; gap: 9px; align-items: flex-start;
      }
      .warn-item:hover { background: #1a2d42; }
      .warn-item:last-child { border-bottom: none; }
      .warn-sev { width: 9px; height: 9px; border-radius: 50%; margin-top: 3px; flex: 0 0 auto; }
      .warn-body { flex: 1; min-width: 0; }
      .warn-region { font-size: 12.5px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .warn-meta { font-size: 11px; color: #8ab0d0; }

      /* legend (bottom-right) */
      .legend {
        position: absolute; right: 12px; bottom: 24px; z-index: 1000; width: 212px;
        background: rgba(13,27,42,0.92); border: 1px solid #2d4a6a; border-radius: 12px;
        box-shadow: 0 4px 18px rgba(0,0,0,0.5); backdrop-filter: blur(6px);
        font-family: -apple-system,"Segoe UI",Arial,sans-serif; color: #cde0f5;
        padding: 10px 12px; font-size: 11.5px;
      }
      .legend h4 { font-size: 12px; color: #fff; margin-bottom: 6px; }
      .legend .lrow { display: flex; align-items: center; gap: 7px; margin: 3px 0; }
      .legend .ldot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; }
      .legend .lsub { color: #8ab0d0; margin-top: 7px; border-top: 1px solid #2d4a6a; padding-top: 6px; line-height: 1.5; }

      /* download button (top-right) + export-only timestamp stamp */
      .dl-btn {
        position: absolute; top: 12px; right: 12px; z-index: 1001; cursor: pointer;
        background: rgba(13,27,42,0.92); color: #cde0f5; border: 1px solid #2d4a6a;
        border-radius: 20px; padding: 8px 14px; font-size: 13px; font-weight: 600;
        font-family: -apple-system,"Segoe UI",Arial,sans-serif;
        box-shadow: 0 2px 12px rgba(0,0,0,0.5); backdrop-filter: blur(6px);
      }
      .dl-btn:hover { background: #1a2d42; }
      .dl-btn:disabled { opacity: 0.6; cursor: default; }
      .export-stamp {
        position: absolute; left: 12px; bottom: 24px; z-index: 1000; display: none;
        background: rgba(13,27,42,0.92); border: 1px solid #2d4a6a; border-radius: 10px;
        padding: 7px 11px; font-size: 11.5px; color: #cde0f5;
        font-family: -apple-system,"Segoe UI",Arial,sans-serif;
      }
      body.exporting .export-stamp { display: block; }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <div class="bar">
      <span class="dot"></span>
      <b>The Big Drone Detector</b> &nbsp;·&nbsp;
      <span id="count">loading…</span> &nbsp;·&nbsp;
      <a href="https://t.me/radarrussiia" target="_blank" rel="noopener">@radarrussiia</a> ·
      <a href="https://t.me/kpszsu" target="_blank" rel="noopener">@kpszsu</a>
    </div>

    <div class="warn-panel" id="warnPanel">
      <div class="warn-head"><span class="wdot"></span><span id="warnTitle">Warnings</span></div>
      <div class="warn-list" id="warnList"></div>
    </div>

    <button class="dl-btn no-export" id="dlBtn" title="Download a PNG of the current map">⬇ Download image</button>

    <div class="legend" id="legend">
      <h4>Legend — threat status</h4>
      <div class="lrow"><span class="ldot" style="background:#ff3b3b"></span> Danger</div>
      <div class="lrow"><span class="ldot" style="background:#ff7a3d"></span> Inbound</div>
      <div class="lrow"><span class="ldot" style="background:#ffb03d"></span> Overhead</div>
      <div class="lrow"><span class="ldot" style="background:#4fb6ff"></span> Intercepted</div>
      <div class="lrow"><span class="ldot" style="background:#3fd87f"></span> All clear</div>
      <div class="lsub">✈ drones &nbsp;·&nbsp; ×N = count &nbsp;·&nbsp; → heading<br>shaded circle = area under danger</div>
    </div>

    <div class="export-stamp" id="exportStamp"></div>

    <script src="vendor/leaflet/leaflet.js"></script>
    <script src="vendor/html2canvas.min.js"></script>
    <script>
      'use strict';

      const ONE_HOUR_MS = 60 * 60 * 1000;

      const THREAT = {
        drone:             { label: 'Drone / UAV',      color: '#ff5c5c', sym: '✈' },
        missile:           { label: 'Missile',           color: '#ff9f3d', sym: '▲' },
        cruise_missile:    { label: 'Cruise missile',    color: '#ff9f3d', sym: '▲' },
        ballistic_missile: { label: 'Ballistic missile', color: '#ff6a00', sym: '▲' },
        air_defense:       { label: 'Air defense',       color: '#4fb6ff', sym: '◆' },
        explosion:         { label: 'Explosion',         color: '#ffd23d', sym: '✸' },
        unknown:           { label: 'Unknown',           color: '#8aa8c8', sym: '●' },
      };

      // Status drives the warning severity AND the marker colour, so the map
      // reads as a live threat level: red = danger, orange = inbound,
      // blue = intercepted, green = all clear.
      const STATUS_INFO = {
        alert:       { level: 3, color: '#ff3b3b', label: 'Danger',      warn: true  },
        impact:      { level: 3, color: '#ff2d2d', label: 'Impact',      warn: true  },
        approaching: { level: 2, color: '#ff7a3d', label: 'Inbound',     warn: true  },
        overhead:    { level: 2, color: '#ffb03d', label: 'Overhead',    warn: true  },
        shot_down:   { level: 1, color: '#4fb6ff', label: 'Intercepted', warn: false },
        all_clear:   { level: 0, color: '#3fd87f', label: 'All clear',   warn: false },
        unknown:     { level: 1, color: '#9ab4d0', label: 'Reported',    warn: false },
      };
      function statusInfo(s) { return STATUS_INFO[s && s.status] || STATUS_INFO.unknown; }
      function markerColor(s) { return statusInfo(s).color; }

      const COMPASS = {
        n:0,north:0,север:0, ne:45,'north-east':45,northeast:45,'северо-восток':45,
        e:90,east:90,восток:90, se:135,'south-east':135,southeast:135,'юго-восток':135,
        s:180,south:180,юг:180, sw:225,'south-west':225,southwest:225,'юго-запад':225,
        w:270,west:270,запад:270, nw:315,'north-west':315,northwest:315,'северо-запад':315,
      };
      function headingToBearing(h) {
        if (!h) return null;
        const k = h.toString().trim().toLowerCase().replace(/\s+/g, '-');
        if (k in COMPASS) return COMPASS[k];
        for (const w of Object.keys(COMPASS)) if (w.length > 2 && k.includes(w)) return COMPASS[w];
        return null;
      }
      // Normalise a place name for matching (lowercase, ё→е, strip punctuation).
      function normPlace(str) {
        return (str || '')
          .toString().toLowerCase().replace(/ё/g, 'е')
          .replace(/[«»"'`.,()\-–—]/g, ' ').replace(/\s+/g, ' ').trim();
      }

      // Extract a place name from free-text headings like "towards Moscow".
      function extractDestFromHeading(heading) {
        if (!heading) return null;
        const m = heading.toString().match(/^\s*towards?\s+(.+)/i);
        return m ? m[1].split(',')[0].trim() : null;
      }

      // Curated coordinates for the destinations this channel names most often,
      // so we can draw a real arrow to the place even when the backend hasn't
      // geocoded it (e.g. older data that only said "towards Moscow").
      const DEST_RAW = [
        [55.7558, 37.6173, ['Moscow', 'Москва', 'Москву', 'Москвы', 'Moscow Oblast']],
        [59.9343, 30.3351, ['Saint Petersburg', 'St Petersburg', 'Петербург', 'Санкт-Петербург']],
        [50.4501, 30.5234, ['Kyiv', 'Kiev', 'Киев', 'Київ']],
        [49.9935, 36.2304, ['Kharkiv', 'Kharkov', 'Харків', 'Харьков']],
        [46.4825, 30.7233, ['Odesa', 'Odessa', 'Одеса', 'Одесса']],
        [48.4647, 35.0462, ['Dnipro', 'Дніпро', 'Днепр']],
        [49.8397, 24.0297, ['Lviv', 'Львів', 'Львов']],
        [47.8388, 35.1396, ['Zaporizhzhia', 'Запоріжжя', 'Запорожье']],
        [46.9750, 31.9946, ['Mykolaiv', 'Миколаїв', 'Николаев']],
        [46.6354, 32.6169, ['Kherson', 'Херсон']],
        [49.5883, 34.5514, ['Poltava', 'Полтава']],
        [50.9077, 34.7981, ['Sumy', 'Суми', 'Сумы']],
        [51.4982, 31.2893, ['Chernihiv', 'Чернігів', 'Чернигов']],
        [47.9105, 33.3918, ['Kryvyi Rih', 'Кривий Ріг', 'Кривой Рог']],
        [50.5997, 36.5983, ['Belgorod', 'Белгород']],
        [51.7373, 36.1874, ['Kursk', 'Курск']],
        [51.6608, 39.2003, ['Voronezh', 'Воронеж']],
        [53.2436, 34.3634, ['Bryansk', 'Брянск']],
        [47.2357, 39.7015, ['Rostov-on-Don', 'Rostov', 'Ростов']],
        [45.0355, 38.9753, ['Krasnodar', 'Краснодар']],
        [54.1931, 37.6173, ['Tula', 'Тула']],
        [54.5293, 36.2754, ['Kaluga', 'Калуга']],
        [52.9651, 36.0785, ['Oryol', 'Orel', 'Орёл', 'Орел']],
        [52.6031, 39.5708, ['Lipetsk', 'Липецк']],
        [52.7212, 41.4523, ['Tambov', 'Тамбов']],
        [54.6269, 39.6916, ['Ryazan', 'Рязань']],
        [54.7818, 32.0401, ['Smolensk', 'Смоленск']],
        [56.8587, 35.9176, ['Tver', 'Тверь']],
        [57.6261, 39.8845, ['Yaroslavl', 'Ярославль']],
        [56.2965, 43.9361, ['Nizhny Novgorod', 'Нижний Новгород']],
        [56.1290, 40.4070, ['Vladimir', 'Владимир']],
        [51.5331, 46.0342, ['Saratov', 'Саратов']],
        [51.4847, 46.1207, ['Engels', 'Энгельс']],
        [48.7080, 44.5133, ['Volgograd', 'Волгоград']],
        [44.6166, 33.5254, ['Sevastopol', 'Севастополь']],
        [44.9521, 34.1024, ['Simferopol', 'Симферополь']],
        [44.7239, 37.7708, ['Novorossiysk', 'Новороссийск']],
        [47.2362, 38.8969, ['Taganrog', 'Таганрог']],
        [55.8304, 49.0661, ['Kazan', 'Казань']],
        [53.1959, 50.1002, ['Samara', 'Самара']],
        [51.7682, 55.0969, ['Orenburg', 'Оренбург']],
      ];
      const DEST_COORDS = {};
      for (const [lat, lon, names] of DEST_RAW) {
        for (const nm of names) DEST_COORDS[normPlace(nm)] = [lat, lon];
      }
      function lookupDest(name) {
        const k = normPlace(name);
        if (!k) return null;
        if (DEST_COORDS[k]) return DEST_COORDS[k];
        const stripped = k
          .replace(/\b(oblast|region|raion|district|city|krai|republic)\b/g, '')
          .replace(/\s+/g, ' ').trim();
        return stripped && DEST_COORDS[stripped] ? DEST_COORDS[stripped] : null;
      }

      // Where a sighting is heading, as coordinates: curated gazetteer first,
      // then any coordinates the backend geocoded.
      function resolveDestLatLon(s) {
        const name = s.destination || extractDestFromHeading(s.heading);
        if (name) {
          const g = lookupDest(name);
          if (g) return { lat: g[0], lon: g[1], name };
        }
        if (typeof s.destinationLat === 'number' && typeof s.destinationLon === 'number') {
          return { lat: s.destinationLat, lon: s.destinationLon, name: name || '' };
        }
        return null;
      }

      // Great-circle initial bearing from point 1 to point 2 (0=N, clockwise).
      function bearingTo(lat1, lon1, lat2, lon2) {
        const toRad = (d) => (d * Math.PI) / 180;
        const φ1 = toRad(lat1), φ2 = toRad(lat2), Δλ = toRad(lon2 - lon1);
        const y = Math.sin(Δλ) * Math.cos(φ2);
        const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
        return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
      }

      // True when the destination is meaningfully away from the sighting.
      function destIsElsewhere(s, dest) {
        return dest && typeof s.lat === 'number' &&
          (Math.abs(dest.lat - s.lat) > 0.05 || Math.abs(dest.lon - s.lon) > 0.05);
      }

      function resolveBearing(s) {
        if (typeof s.bearing === 'number' && isFinite(s.bearing)) return s.bearing;
        const dest = resolveDestLatLon(s);
        if (destIsElsewhere(s, dest)) return bearingTo(s.lat, s.lon, dest.lat, dest.lon);
        return headingToBearing(s.heading);
      }

      // Haversine distance in km.
      function haversineKm(lat1, lon1, lat2, lon2) {
        const toRad = (d) => (d * Math.PI) / 180;
        const dla = toRad(lat2 - lat1), dlo = toRad(lon2 - lon1);
        const a = Math.sin(dla / 2) ** 2 +
          Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dlo / 2) ** 2;
        return 2 * 6371 * Math.asin(Math.sqrt(a));
      }

      // Only draw an arrow when we're confident WHERE it's going: a named
      // destination we have coordinates for, within a sane range. A compass
      // heading or projected guess is NOT enough — no destination, no arrow.
      const MAX_ARROW_KM = 1500;
      function confidentDest(s) {
        const dest = resolveDestLatLon(s);
        if (!destIsElsewhere(s, dest)) return null;
        if (haversineKm(s.lat, s.lon, dest.lat, dest.lon) > MAX_ARROW_KM) return null;
        return dest;
      }
      function confidentBearing(s) {
        const dest = confidentDest(s);
        return dest ? bearingTo(s.lat, s.lon, dest.lat, dest.lon) : null;
      }

      // Drop "destination echo" markers: if one sighting in a post heads toward
      // a place, a second sighting AT that place (same post) is the model
      // duplicating the destination — so one event shows one group, not two.
      function sightingDest(s) {
        return s.destination || extractDestFromHeading(s.heading) || '';
      }
      function dropDestinationEchoes(list) {
        const byPost = new Map();
        for (const s of list) {
          const k = s.postId != null ? s.postId : s.id;
          if (!byPost.has(k)) byPost.set(k, []);
          byPost.get(k).push(s);
        }
        const drop = new Set();
        for (const group of byPost.values()) {
          if (group.length < 2) continue;
          for (const a of group) {
            const aLoc = normPlace(a.location);
            if (!aLoc) continue;
            for (const b of group) {
              if (a === b) continue;
              if (normPlace(sightingDest(b)) === aLoc) { drop.add(a.id); break; }
            }
          }
        }
        return list.filter((s) => !drop.has(s.id));
      }

      function esc(s) {
        return (s || '').replace(/[&<>"']/g, (c) =>
          ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
      }
      function fmtTime(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        if (isNaN(d)) return '';
        const diff = Math.round((Date.now() - d) / 60000);
        if (diff < 1) return 'just now';
        if (diff < 60) return diff + 'm ago';
        return Math.round(diff / 60) + 'h ago';
      }
      function bearingWord(b) {
        const dirs = ['N','NE','E','SE','S','SW','W','NW'];
        return dirs[Math.round(b / 45) % 8];
      }

      // ---- glyph builders: each returns an SVG fragment centred at (cx,cy) ----

      // Top-down quadcopter: 4 rotor arms + spinning rotors + body.
      function droneGlyph(cx, cy, color, s) {
        const a = 4.8 * s;    // arm reach to rotor centre
        const rr = 3.0 * s;   // rotor radius
        const sw = 1.6 * s;   // stroke width
        const corners = [[-a, -a], [a, -a], [-a, a], [a, a]];
        let arms = '';
        let rotors = '';
        for (const [dx, dy] of corners) {
          arms += `<line x1="${cx}" y1="${cy}" x2="${cx + dx}" y2="${cy + dy}" stroke="${color}" stroke-width="${sw}" stroke-linecap="round"/>`;
          rotors += `<circle class="rotor" cx="${cx + dx}" cy="${cy + dy}" r="${rr}" fill="#0d1b2a" stroke="${color}" stroke-width="${1.3 * s}"/>`;
          rotors += `<line class="rotor" x1="${cx + dx - rr * 0.7}" y1="${cy + dy}" x2="${cx + dx + rr * 0.7}" y2="${cy + dy}" stroke="${color}" stroke-width="${0.9 * s}" opacity="0.7"/>`;
        }
        const body = `<circle cx="${cx}" cy="${cy}" r="${2.6 * s}" fill="${color}"/>`;
        return arms + rotors + body;
      }

      // Missile / rocket: a pointed dart.
      function missileGlyph(cx, cy, color, s) {
        const h = 7.5 * s;
        return (
          `<polygon points="${cx},${cy - h} ${cx - h * 0.55},${cy + h * 0.7} ${cx + h * 0.55},${cy + h * 0.7}" fill="#0d1b2a" stroke="${color}" stroke-width="${1.7 * s}" stroke-linejoin="round"/>` +
          `<polygon points="${cx},${cy - h} ${cx - h * 0.28},${cy} ${cx + h * 0.28},${cy}" fill="${color}"/>`
        );
      }

      // Fallback: a coloured chip with the threat symbol.
      function genericGlyph(cx, cy, color, sym, s) {
        const r = 7.5 * s;
        return (
          `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#0d1b2a" stroke="${color}" stroke-width="${2 * s}"/>` +
          `<text x="${cx}" y="${cy + 3.6 * s}" text-anchor="middle" font-family="Arial,sans-serif" font-size="${10.5 * s}" font-weight="bold" fill="${color}">${sym}</text>`
        );
      }

      function threatGlyph(type, cx, cy, color, s) {
        if (type === 'drone') return droneGlyph(cx, cy, color, s);
        if (type === 'missile' || type === 'cruise_missile' || type === 'ballistic_missile') {
          return missileGlyph(cx, cy, color, s);
        }
        return genericGlyph(cx, cy, color, (THREAT[type] || THREAT.unknown).sym, s);
      }

      // Build the marker icon: a single threat glyph with a count label beside
      // it and a travel arrow rotated to the bearing. One icon per sighting —
      // the number says how many, the arrow says where it's going.
      function buildIcon(s) {
        const info = statusInfo(s);
        const color = info.color;
        // Arrow only when the destination is known — not from a bare heading.
        const bearing = confidentBearing(s);
        const isWarn = info.warn;        // active threat → pulse
        const isDanger = info.level >= 3; // danger/impact → alert ring
        const count = Math.max(1, s.count || 1);

        const scale = 1.05;
        const glyphR = 7.8 * scale;
        const showCount = count > 1;
        const label = '×' + count;
        const fs = 12.5;
        const labelW = showCount ? label.length * 7 + 12 : 0;
        const labelGap = 6;
        const labelHalf = showCount ? 10 : 0;
        const ringR = isDanger ? glyphR + 4 : glyphR;
        const arrowReach = bearing !== null ? glyphR + 22 : 0;
        const m = 5;

        // Pad each side for the largest thing that can reach there.
        const leftPad = Math.max(ringR, arrowReach);
        const topPad = Math.max(ringR, arrowReach, labelHalf);
        const botPad = Math.max(ringR, arrowReach, labelHalf);
        const rightPad = Math.max(ringR, arrowReach, glyphR + labelGap + labelW);
        const Gx = leftPad + m, Gy = topPad + m;
        const W = Math.ceil(leftPad + rightPad + 2 * m);
        const H = Math.ceil(topPad + botPad + 2 * m);

        const glyph = threatGlyph(s.threatType, Gx, Gy, color, scale);

        let arrow = '';
        if (bearing !== null) {
          const base = glyphR + 3, head = glyphR + 16, tip = glyphR + 22;
          arrow =
            `<g transform="rotate(${bearing} ${Gx} ${Gy})">` +
            `<line x1="${Gx}" y1="${Gy - base}" x2="${Gx}" y2="${Gy - head}" stroke="${color}" stroke-width="3" stroke-linecap="round"/>` +
            `<polygon points="${Gx},${Gy - tip} ${Gx - 6},${Gy - head + 1} ${Gx + 6},${Gy - head + 1}" fill="${color}"/>` +
            `</g>`;
        }

        // Pulse only for active threats so resolved/all-clear markers stay calm.
        const pulse = isWarn
          ? `<circle class="pulse" cx="${Gx}" cy="${Gy}" r="${glyphR}" fill="${color}"/>`
          : '';
        const alertRing = isDanger
          ? `<circle class="pulse-alert" cx="${Gx}" cy="${Gy}" r="${glyphR + 4}" fill="none" stroke="${color}" stroke-width="2" opacity="0.8"/>`
          : '';

        let badge = '';
        if (showCount) {
          const bx = Gx + glyphR + labelGap;
          badge =
            `<rect x="${bx}" y="${Gy - 9}" width="${labelW}" height="18" rx="9" fill="#0d1b2a" stroke="${color}" stroke-width="1.5"/>` +
            `<text x="${bx + labelW / 2}" y="${Gy + 4}" text-anchor="middle" font-family="Arial,sans-serif" font-size="${fs}" font-weight="bold" fill="${color}">${label}</text>`;
        }

        const svg =
          `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">` +
          alertRing + pulse + arrow + glyph + badge + `</svg>`;

        return L.divIcon({
          className: 'threat-icon',
          html: svg,
          iconSize: [W, H],
          iconAnchor: [Gx, Gy],
          popupAnchor: [0, -(topPad + 2)],
        });
      }

      // A standalone arrowhead placed at the end of a direction line so the
      // projected path clearly points to where the threat is heading.
      function arrowheadIcon(bearing, color) {
        const svg =
          `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22">` +
          `<g transform="rotate(${bearing} 11 11)">` +
          `<polygon points="11,2 4,17 11,13 18,17" fill="${color}" stroke="#0d1b2a" stroke-width="1"/>` +
          `</g></svg>`;
        return L.divIcon({
          className: 'arrow-icon',
          html: svg,
          iconSize: [22, 22],
          iconAnchor: [11, 11],
        });
      }

      function popupHtml(s) {
        const t = THREAT[s.threatType] || THREAT.unknown;
        const info = statusInfo(s);
        const bits = [t.label];
        if (s.count) bits.push('×' + s.count);
        if (s.region) bits.push(s.region);
        const bearing = resolveBearing(s);

        // Resolve destination display text: explicit field > extracted from heading
        const destName = s.destination || extractDestFromHeading(s.heading);

        let going = '';
        if (destName) {
          going = `<div class="popup-dest">➤ Heading toward ${esc(destName)}</div>`;
        } else if (bearing !== null) {
          going = `<div class="popup-dest">➤ Heading ${esc(s.heading || bearingWord(bearing))}</div>`;
        }

        const statusLine =
          `<div class="popup-status" style="color:${info.color}">● ${esc(info.label)}` +
          `${info.level >= 3 ? ' — warning' : ''}</div>`;

        // Accuracy line: how many reports back this, how precise the location
        // is, and the extraction confidence.
        const accBits = [];
        if (s.reports > 1) accBits.push(`${s.reports} reports`);
        accBits.push(s.geocodePrecision === 'region' ? 'region-level (approx.)' : 'pinpoint');
        if (typeof s.confidence === 'number') accBits.push(`${Math.round(s.confidence * 100)}% conf.`);
        if (s.channel) accBits.push('via @' + s.channel);
        const accLine = `<div class="popup-acc">${esc(accBits.join(' · '))}</div>`;

        return `
          <div class="popup-title">${esc(s.location)}</div>
          ${statusLine}
          <div class="popup-meta">${esc(bits.join(' · '))} · ${fmtTime(s.timestamp)}</div>
          ${going}
          ${accLine}
          ${s.postText ? `<div class="popup-text">${esc(s.postText)}</div>` : ''}
          ${s.postLink ? `<div class="popup-link"><a href="${esc(s.postLink)}" target="_blank" rel="noopener">Open in Telegram ↗</a></div>` : ''}
        `;
      }

      // dark tiles. preferCanvas renders the circles/lines onto a canvas, which
      // exports far more cleanly than Leaflet's default SVG overlay.
      const map = L.map('map', { zoomControl: true, preferCanvas: true }).setView([55.0, 40.0], 5);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19,
        // CORS so the tiles can be drawn into a canvas for image export.
        crossOrigin: 'anonymous',
        attribution: '© <a href="https://www.openstreetmap.org/copyright" style="color:#5aafff">OpenStreetMap</a> © <a href="https://carto.com/attributions" style="color:#5aafff">CARTO</a>',
      }).addTo(map);

      document.addEventListener('DOMContentLoaded', () => {
        const style = document.createElement('style');
        style.textContent = `
          .leaflet-control-zoom a { background:#1a2d42!important; color:#cde0f5!important; border-color:#2d4a6a!important; }
          .leaflet-control-zoom a:hover { background:#243f5e!important; }
          .leaflet-control-attribution { background:rgba(13,27,42,0.7)!important; color:#8aa8c8!important; }
        `;
        document.head.appendChild(style);
      });

      const layer = L.layerGroup().addTo(map);

      // Render the whole view (map tiles, markers, warning areas, legend,
      // warnings panel) to a PNG and download it.
      async function downloadImage() {
        const btn = document.getElementById('dlBtn');
        if (typeof html2canvas !== 'function') {
          alert('Image renderer failed to load.');
          return;
        }
        const original = btn.textContent;
        btn.disabled = true;
        btn.textContent = 'Rendering…';
        document.body.classList.add('exporting');
        document.getElementById('exportStamp').textContent =
          'The Big Drone Detector · ' + new Date().toLocaleString() + ' · t.me/radarrussiia';
        // Let any in-flight tiles settle before snapshotting.
        await new Promise((r) => setTimeout(r, 350));
        try {
          const canvas = await html2canvas(document.body, {
            useCORS: true,
            backgroundColor: '#0d1b2a',
            scale: 2, // sharper, higher-resolution export
            logging: false,
            imageTimeout: 15000,
            // Don't bake the download button or zoom controls into the image.
            ignoreElements: (el) =>
              el.classList && (el.classList.contains('no-export') || el.classList.contains('leaflet-control-zoom')),
            // Freeze the marker animations in the snapshot so pulses don't
            // smear into faint blobs across the picture.
            onclone: (doc) => {
              const st = doc.createElement('style');
              st.textContent =
                '.pulse,.pulse-alert{display:none !important}' +
                '.threat-icon .rotor{animation:none !important}';
              doc.head.appendChild(st);
            },
          });
          const stamp = new Date().toISOString().slice(0, 16).replace(/[:T]/g, '-');
          const link = document.createElement('a');
          link.download = `drone-map-${stamp}.png`;
          link.href = canvas.toDataURL('image/png');
          document.body.appendChild(link);
          link.click();
          link.remove();
        } catch (err) {
          alert('Could not render the map image: ' + err.message);
        } finally {
          document.body.classList.remove('exporting');
          btn.disabled = false;
          btn.textContent = original;
        }
      }
      document.getElementById('dlBtn').addEventListener('click', downloadImage);

      // Build the live warnings list: active threats grouped by region, most
      // severe and most recent first. Clicking an entry flies there.
      function renderWarnings(sightings) {
        const panel = document.getElementById('warnPanel');
        const list = document.getElementById('warnList');
        const title = document.getElementById('warnTitle');

        const warns = sightings.filter((s) => statusInfo(s).warn);
        if (!warns.length) { panel.style.display = 'none'; return; }

        const groups = new Map();
        for (const s of warns) {
          const key = s.region || s.location || '—';
          const info = statusInfo(s);
          let g = groups.get(key);
          if (!g) {
            g = { key, level: 0, spots: 0, latest: 0, latlng: [s.lat, s.lon], label: info.label, color: info.color };
            groups.set(key, g);
          }
          g.spots++;
          const t = Date.parse(s.timestamp || '') || 0;
          if (t > g.latest) g.latest = t;
          if (info.level > g.level) {
            g.level = info.level; g.label = info.label; g.color = info.color; g.latlng = [s.lat, s.lon];
          }
        }

        const arr = [...groups.values()]
          .sort((a, b) => b.level - a.level || b.latest - a.latest)
          .slice(0, 14);
        const danger = arr.some((g) => g.level >= 3);

        panel.className = 'warn-panel' + (danger ? ' danger' : '');
        panel.style.display = 'block';
        title.textContent = `Active warnings (${groups.size})`;

        list.innerHTML = '';
        for (const g of arr) {
          const ago = g.latest ? fmtTime(new Date(g.latest).toISOString()) : '';
          const row = document.createElement('div');
          row.className = 'warn-item';
          row.innerHTML =
            `<span class="warn-sev" style="background:${g.color}"></span>` +
            `<span class="warn-body">` +
            `<span class="warn-region">${esc(g.key)}</span>` +
            `<span class="warn-meta">${esc(g.label)} · ${g.spots} spot${g.spots > 1 ? 's' : ''}${ago ? ' · ' + ago : ''}</span>` +
            `</span>`;
          row.addEventListener('click', () => {
            if (typeof g.latlng[0] === 'number') {
              map.flyTo(g.latlng, Math.max(map.getZoom(), 8), { duration: 0.6 });
            }
          });
          list.appendChild(row);
        }
      }

      // A single post that lists one number across many areas is a TOTAL, not a
      // per-location count — null those out so it isn't shown on every marker.
      function stripSummaryCounts(list) {
        const byPost = new Map();
        for (const s of list) {
          const k = (s.channel || '') + '/' + s.postId;
          if (!byPost.has(k)) byPost.set(k, []);
          byPost.get(k).push(s);
        }
        const nulled = new Set();
        for (const arr of byPost.values()) {
          if (arr.length < 3) continue;
          const counts = arr.map((s) => s.count).filter((c) => typeof c === 'number');
          if (counts.length >= 3 && new Set(counts).size === 1 && counts[0] >= 10) {
            for (const s of arr) nulled.add(s);
          }
        }
        if (!nulled.size) return list;
        return list.map((s) => (nulled.has(s) ? Object.assign({}, s, { count: null }) : s));
      }

      // Merge repeat reports of the same place (many posts about one town)
      // into a single marker showing the current state, so the map reflects
      // distinct locations rather than stacks of overlapping pins.
      function consolidateByLocation(list) {
        const groups = new Map();
        for (const s of list) {
          const key = normPlace(s.location) + '|' + normPlace(s.region);
          if (!groups.has(key)) groups.set(key, []);
          groups.get(key).push(s);
        }
        const out = [];
        for (const arr of groups.values()) {
          arr.sort((a, b) => (Date.parse(b.timestamp || '') || 0) - (Date.parse(a.timestamp || '') || 0));
          const rep = Object.assign({}, arr[0]); // newest report = current state
          rep.reports = arr.length;
          const times = arr.map((s) => Date.parse(s.timestamp || '') || 0).filter(Boolean);
          rep.lastSeen = times.length ? Math.max.apply(null, times) : 0;
          if (rep.count == null) {
            const counts = arr.map((s) => s.count).filter((n) => typeof n === 'number');
            rep.count = counts.length ? Math.max.apply(null, counts) : null;
          }
          out.push(rep);
        }
        return out;
      }

      async function load() {
        try {
          const res = await fetch('data/sightings.json?t=' + Date.now());
          const data = await res.json();
          const cutoff = Date.now() - ONE_HOUR_MS;

          const inWindow = (data.sightings || []).filter((s) => {
            if (typeof s.lat !== 'number' || typeof s.lon !== 'number') return false;
            const t = Date.parse(s.timestamp || '');
            return t && t >= cutoff;
          });
          // Drop destination echoes, strip summary totals stamped across many
          // areas, filter low-confidence noise, then merge repeat reports.
          const cleaned = stripSummaryCounts(
            dropDestinationEchoes(inWindow)
          ).filter((s) => typeof s.confidence !== 'number' || s.confidence >= 0.3);
          const sightings = consolidateByLocation(cleaned);

          layer.clearLayers();
          const pts = [];

          for (const s of sightings) {
            const info = statusInfo(s);
            const color = info.color;

            // Translucent danger circle for region-wide danger / impacts.
            if (info.level >= 3) {
              L.circle([s.lat, s.lon], {
                radius: 45000,
                color,
                fillColor: color,
                fillOpacity: 0.07,
                weight: 1,
                opacity: 0.35,
                dashArray: '5 5',
              }).addTo(layer);
            } else if (s.geocodePrecision === 'region') {
              // Approximate (region-centroid) placement → show an uncertainty ring.
              L.circle([s.lat, s.lon], {
                radius: 30000,
                color: '#6f93b4',
                weight: 1,
                opacity: 0.25,
                fill: false,
                dashArray: '3 6',
              }).addTo(layer);
            }

            // Direction arrow ONLY when we know the actual destination — draw a
            // line straight to it. No destination → no arrow (a bare compass
            // heading isn't certain enough to point anywhere).
            const dest = confidentDest(s);
            if (dest) {
              const lineEnd = [dest.lat, dest.lon];
              const lineBearing = bearingTo(s.lat, s.lon, dest.lat, dest.lon);
              L.polyline([[s.lat, s.lon], lineEnd], {
                color, weight: 2.5, opacity: 0.55, dashArray: '7 6',
              }).addTo(layer);
              L.marker(lineEnd, {
                icon: arrowheadIcon(lineBearing, color),
                interactive: false,
                keyboard: false,
              }).addTo(layer);
              pts.push(lineEnd);
            }

            L.marker([s.lat, s.lon], { icon: buildIcon(s) })
              .bindPopup(popupHtml(s), { maxWidth: 280 })
              .addTo(layer);
            pts.push([s.lat, s.lon]);
          }

          if (pts.length) map.fitBounds(pts, { padding: [60, 60], maxZoom: 9 });

          renderWarnings(sightings);

          const when = data.updatedAt ? fmtTime(data.updatedAt) : '—';
          let statusText;
          if (!sightings.length) {
            statusText = `no sightings in last hour · updated ${when}`;
          } else {
            const danger = sightings.filter((s) => statusInfo(s).level >= 3).length;
            const inbound = sightings.filter((s) => statusInfo(s).level === 2).length;
            const intercepted = sightings.filter((s) => s.status === 'shot_down').length;
            const parts = [`${sightings.length} active`];
            if (danger) parts.push(`${danger} danger`);
            if (inbound) parts.push(`${inbound} inbound`);
            if (intercepted) parts.push(`${intercepted} intercepted`);
            parts.push(when);
            statusText = parts.join(' · ');
          }
          document.getElementById('count').textContent = statusText;
        } catch {
          document.getElementById('count').textContent = 'failed to load';
        }
      }

      load();
      setInterval(load, 2 * 60 * 1000);
    </script>
  </body>
</html>
