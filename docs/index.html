<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Big Drone Detector</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      }
      /* Full-screen map */
      #map { position: absolute; inset: 0; background: #aadaff; }

      /* Floating title bar */
      .bar {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 1000;
        background: rgba(15, 25, 38, 0.85);
        color: #e6eef7;
        padding: 8px 14px;
        border-radius: 8px;
        font-size: 14px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        max-width: calc(100% - 20px);
      }
      .bar b { font-size: 15px; }
      .bar .sub { font-size: 12px; opacity: 0.8; margin-top: 2px; }
      .bar a { color: #6cc0ff; text-decoration: none; }
      .bar a:hover { text-decoration: underline; }

      /* Legend */
      .legend {
        position: absolute;
        bottom: 18px;
        left: 10px;
        z-index: 1000;
        background: rgba(15, 25, 38, 0.85);
        color: #e6eef7;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 12px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      }
      .legend .row { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
      .legend .swatch {
        width: 11px; height: 11px; border-radius: 50%; display: inline-block;
      }

      .popup b { font-size: 14px; }
      .popup .meta { color: #555; font-size: 12px; margin: 4px 0; }
      .popup .text {
        font-size: 12px; max-height: 80px; overflow-y: auto;
        white-space: pre-wrap; border-top: 1px solid #ddd; padding-top: 4px; margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <div class="bar">
      <b>🛰️ The Big Drone Detector</b>
      <div class="sub">
        <span id="count">Loading…</span> · source:
        <a href="https://t.me/radarrussiia" target="_blank" rel="noopener">@radarrussiia</a>
      </div>
    </div>

    <div class="legend">
      <div class="row"><span class="swatch" style="background:#ff5c5c"></span> Drone</div>
      <div class="row"><span class="swatch" style="background:#ff8a3d"></span> Missile</div>
      <div class="row"><span class="swatch" style="background:#4fb6ff"></span> Air defense</div>
      <div class="row"><span class="swatch" style="background:#ffd23d"></span> Explosion</div>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN2GqBo="
      crossorigin=""
    ></script>
    <script>
      'use strict';

      const COLORS = {
        drone: '#ff5c5c',
        missile: '#ff8a3d',
        cruise_missile: '#ff8a3d',
        ballistic_missile: '#ff6a00',
        air_defense: '#4fb6ff',
        explosion: '#ffd23d',
        unknown: '#9fb3c8',
      };
      const LABELS = {
        drone: 'Drone / UAV',
        missile: 'Missile',
        cruise_missile: 'Cruise missile',
        ballistic_missile: 'Ballistic missile',
        air_defense: 'Air defense',
        explosion: 'Explosion',
        unknown: 'Unknown',
      };

      // Basic map
      const map = L.map('map').setView([55.0, 40.0], 5);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18,
        attribution: '© OpenStreetMap contributors',
      }).addTo(map);

      let layer = L.layerGroup().addTo(map);

      function esc(s) {
        return (s || '').replace(/[&<>"']/g, (c) => (
          { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
        ));
      }

      function popup(s) {
        const bits = [LABELS[s.threatType] || s.threatType];
        if (s.count) bits.push('×' + s.count);
        if (s.region) bits.push(s.region);
        let html = `<div class="popup"><b>${esc(s.location)}</b>`;
        html += `<div class="meta">${esc(bits.filter(Boolean).join(' · '))}</div>`;
        if (s.postText) html += `<div class="text">${esc(s.postText)}</div>`;
        if (s.postLink) {
          html += `<div style="margin-top:6px"><a href="${esc(s.postLink)}" target="_blank" rel="noopener">Open Telegram post ↗</a></div>`;
        }
        return html + '</div>';
      }

      async function load() {
        try {
          const res = await fetch('data/sightings.json?t=' + Date.now());
          const data = await res.json();
          const sightings = (data.sightings || []).filter(
            (s) => typeof s.lat === 'number' && typeof s.lon === 'number'
          );

          layer.clearLayers();
          const pts = [];
          for (const s of sightings) {
            const color = COLORS[s.threatType] || COLORS.unknown;
            const m = L.circleMarker([s.lat, s.lon], {
              radius: 8,
              color,
              weight: 2,
              fillColor: color,
              fillOpacity: 0.6,
            }).bindPopup(popup(s));
            layer.addLayer(m);
            pts.push([s.lat, s.lon]);
          }

          if (pts.length) map.fitBounds(pts, { padding: [40, 40], maxZoom: 8 });

          const when = data.updatedAt ? new Date(data.updatedAt).toLocaleString() : '—';
          document.getElementById('count').textContent =
            sightings.length + ' sighting' + (sightings.length === 1 ? '' : 's') + ' · updated ' + when;
        } catch (err) {
          document.getElementById('count').textContent = 'Failed to load data';
        }
      }

      load();
      // Refresh the map every 2 minutes
      setInterval(load, 2 * 60 * 1000);
    </script>
  </body>
</html>
