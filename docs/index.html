<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Big Drone Detector</title>
    <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; background: #0d1b2a; }
      #map { position: absolute; inset: 0; }

      /* dark popups */
      .leaflet-popup-content-wrapper {
        background: #1a2d42; color: #e0eaf5; border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.6); border: 1px solid #2d4a6a;
      }
      .leaflet-popup-tip { background: #1a2d42; }
      .leaflet-popup-content { margin: 12px 14px; font-size: 13px; line-height: 1.5; }
      .popup-title { font-size: 14px; font-weight: 700; margin-bottom: 5px; color: #fff; }
      .popup-meta  { color: #8ab0d0; font-size: 12px; margin-bottom: 3px; }
      .popup-dest  { color: #ffd27f; font-size: 12px; margin-bottom: 3px; }
      .popup-alert { color: #ff9f3d; font-size: 12px; font-weight: 600; margin-bottom: 3px; }
      .popup-text  {
        font-size: 12px; max-height: 75px; overflow-y: auto; white-space: pre-wrap;
        border-top: 1px solid #2d4a6a; padding-top: 6px; margin-top: 6px; color: #c0d8ee;
      }
      .popup-link  { margin-top: 7px; }
      .popup-link a { color: #5aafff; font-size: 12px; text-decoration: none; }
      .popup-link a:hover { text-decoration: underline; }

      /* title bar */
      .bar {
        position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
        z-index: 1000; background: rgba(13,27,42,0.88); color: #cde0f5;
        padding: 8px 18px; border-radius: 24px; border: 1px solid #2d4a6a;
        box-shadow: 0 2px 12px rgba(0,0,0,0.5); font-size: 13px; white-space: nowrap;
        backdrop-filter: blur(6px); font-family: -apple-system,"Segoe UI",Arial,sans-serif;
      }
      .bar b { color: #fff; }
      .bar a { color: #5aafff; text-decoration: none; }
      .bar a:hover { text-decoration: underline; }
      .bar .dot {
        display: inline-block; width: 7px; height: 7px; border-radius: 50%;
        background: #3fd87f; margin-right: 5px; vertical-align: middle;
        animation: blink 2s ease-in-out infinite;
      }
      @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

      .threat-icon, .arrow-icon { background: none; border: none; }
      .threat-icon svg { overflow: visible; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.7)); }
      .arrow-icon svg { overflow: visible; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.6)); }
      .threat-icon .pulse { animation: ping 2.4s ease-out infinite; transform-origin: center; }
      .threat-icon .pulse-alert { animation: ping-alert 2s ease-out infinite; transform-origin: center; }
      .threat-icon .rotor { animation: spin 3s linear infinite; transform-origin: center; transform-box: fill-box; }
      @keyframes ping { 0% { opacity: 0.5; } 70%,100% { opacity: 0; transform: scale(2.4); } }
      @keyframes ping-alert { 0% { opacity: 0.6; } 70%,100% { opacity: 0; transform: scale(1.8); } }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <div class="bar">
      <span class="dot"></span>
      <b>The Big Drone Detector</b> &nbsp;·&nbsp;
      <span id="count">loading…</span> &nbsp;·&nbsp;
      <a href="https://t.me/radarrussiia" target="_blank" rel="noopener">@radarrussiia</a>
    </div>

    <script src="vendor/leaflet/leaflet.js"></script>
    <script>
      'use strict';

      const ONE_HOUR_MS = 60 * 60 * 1000;

      const THREAT = {
        drone:             { label: 'Drone / UAV',      color: '#ff5c5c', sym: '✈' },
        missile:           { label: 'Missile',           color: '#ff9f3d', sym: '▲' },
        cruise_missile:    { label: 'Cruise missile',    color: '#ff9f3d', sym: '▲' },
        ballistic_missile: { label: 'Ballistic missile', color: '#ff6a00', sym: '▲' },
        air_defense:       { label: 'Air defense',       color: '#4fb6ff', sym: '◆' },
        explosion:         { label: 'Explosion',         color: '#ffd23d', sym: '✸' },
        unknown:           { label: 'Unknown',           color: '#8aa8c8', sym: '●' },
      };

      const COMPASS = {
        n:0,north:0,север:0, ne:45,'north-east':45,northeast:45,'северо-восток':45,
        e:90,east:90,восток:90, se:135,'south-east':135,southeast:135,'юго-восток':135,
        s:180,south:180,юг:180, sw:225,'south-west':225,southwest:225,'юго-запад':225,
        w:270,west:270,запад:270, nw:315,'north-west':315,northwest:315,'северо-запад':315,
      };
      function headingToBearing(h) {
        if (!h) return null;
        const k = h.toString().trim().toLowerCase().replace(/\s+/g, '-');
        if (k in COMPASS) return COMPASS[k];
        for (const w of Object.keys(COMPASS)) if (w.length > 2 && k.includes(w)) return COMPASS[w];
        return null;
      }
      function resolveBearing(s) {
        if (typeof s.bearing === 'number' && isFinite(s.bearing)) return s.bearing;
        return headingToBearing(s.heading);
      }

      // Extract place name from free-text headings the LLM may have produced
      // (e.g. "towards Moscow") when the backend didn't post-process them.
      function extractDestFromHeading(heading) {
        if (!heading) return null;
        const m = heading.match(/^towards?\s+(.+)/i);
        return m ? m[1].split(',')[0].trim() : null;
      }

      // Compute destination lat/lon from start point + bearing + distance (km).
      function destPoint(lat, lon, bearing, distKm) {
        const R = 6371;
        const d = distKm / R;
        const φ1 = lat * Math.PI / 180;
        const λ1 = lon * Math.PI / 180;
        const θ = bearing * Math.PI / 180;
        const φ2 = Math.asin(Math.sin(φ1) * Math.cos(d) + Math.cos(φ1) * Math.sin(d) * Math.cos(θ));
        const λ2 = λ1 + Math.atan2(Math.sin(θ) * Math.sin(d) * Math.cos(φ1),
                                    Math.cos(d) - Math.sin(φ1) * Math.sin(φ2));
        return [φ2 * 180 / Math.PI, λ2 * 180 / Math.PI];
      }

      function esc(s) {
        return (s || '').replace(/[&<>"']/g, (c) =>
          ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
      }
      function fmtTime(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        if (isNaN(d)) return '';
        const diff = Math.round((Date.now() - d) / 60000);
        if (diff < 1) return 'just now';
        if (diff < 60) return diff + 'm ago';
        return Math.round(diff / 60) + 'h ago';
      }
      function bearingWord(b) {
        const dirs = ['N','NE','E','SE','S','SW','W','NW'];
        return dirs[Math.round(b / 45) % 8];
      }

      // ---- glyph builders: each returns an SVG fragment centred at (cx,cy) ----

      // Top-down quadcopter: 4 rotor arms + spinning rotors + body.
      function droneGlyph(cx, cy, color, s) {
        const a = 4.8 * s;    // arm reach to rotor centre
        const rr = 3.0 * s;   // rotor radius
        const sw = 1.6 * s;   // stroke width
        const corners = [[-a, -a], [a, -a], [-a, a], [a, a]];
        let arms = '';
        let rotors = '';
        for (const [dx, dy] of corners) {
          arms += `<line x1="${cx}" y1="${cy}" x2="${cx + dx}" y2="${cy + dy}" stroke="${color}" stroke-width="${sw}" stroke-linecap="round"/>`;
          rotors += `<circle class="rotor" cx="${cx + dx}" cy="${cy + dy}" r="${rr}" fill="#0d1b2a" stroke="${color}" stroke-width="${1.3 * s}"/>`;
          rotors += `<line class="rotor" x1="${cx + dx - rr * 0.7}" y1="${cy + dy}" x2="${cx + dx + rr * 0.7}" y2="${cy + dy}" stroke="${color}" stroke-width="${0.9 * s}" opacity="0.7"/>`;
        }
        const body = `<circle cx="${cx}" cy="${cy}" r="${2.6 * s}" fill="${color}"/>`;
        return arms + rotors + body;
      }

      // Missile / rocket: a pointed dart.
      function missileGlyph(cx, cy, color, s) {
        const h = 7.5 * s;
        return (
          `<polygon points="${cx},${cy - h} ${cx - h * 0.55},${cy + h * 0.7} ${cx + h * 0.55},${cy + h * 0.7}" fill="#0d1b2a" stroke="${color}" stroke-width="${1.7 * s}" stroke-linejoin="round"/>` +
          `<polygon points="${cx},${cy - h} ${cx - h * 0.28},${cy} ${cx + h * 0.28},${cy}" fill="${color}"/>`
        );
      }

      // Fallback: a coloured chip with the threat symbol.
      function genericGlyph(cx, cy, color, sym, s) {
        const r = 7.5 * s;
        return (
          `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#0d1b2a" stroke="${color}" stroke-width="${2 * s}"/>` +
          `<text x="${cx}" y="${cy + 3.6 * s}" text-anchor="middle" font-family="Arial,sans-serif" font-size="${10.5 * s}" font-weight="bold" fill="${color}">${sym}</text>`
        );
      }

      function threatGlyph(type, cx, cy, color, s) {
        if (type === 'drone') return droneGlyph(cx, cy, color, s);
        if (type === 'missile' || type === 'cruise_missile' || type === 'ballistic_missile') {
          return missileGlyph(cx, cy, color, s);
        }
        return genericGlyph(cx, cy, color, (THREAT[type] || THREAT.unknown).sym, s);
      }

      // Formation layouts. Both return local pixel offsets centred on the
      // origin. For the wedge, "forward" is -y so the tip leads in the travel
      // direction; the whole group is later rotated to the bearing.
      function wedgeLocal(n, gap, maxW) {
        const pts = [];
        let placed = 0, row = 0;
        while (placed < n) {
          const inRow = Math.min(row + 1, maxW, n - placed);
          const startX = -((inRow - 1) / 2) * gap;
          for (let c = 0; c < inRow; c++) pts.push([startX + c * gap, row * gap]);
          placed += inRow;
          row++;
        }
        const ys = pts.map((p) => p[1]);
        const midY = (Math.min(...ys) + Math.max(...ys)) / 2;
        return pts.map(([x, y]) => [x, y - midY]); // centre vertically
      }
      function cloudLocal(n, gap) {
        if (n <= 1) return [[0, 0]];
        const pts = [];
        const golden = Math.PI * (3 - Math.sqrt(5)); // sunflower packing
        const c = gap * 0.62;
        for (let i = 0; i < n; i++) {
          const r = c * Math.sqrt(i + 0.5);
          const th = i * golden;
          pts.push([r * Math.cos(th), r * Math.sin(th)]);
        }
        return pts;
      }

      // Build the marker icon: one drone glyph per object. When the swarm is
      // heading somewhere, the glyphs fan out into a wedge along the bearing so
      // it reads as a moving formation rather than one stacked group; the
      // leading arrow (and the 200 km map line) both point to the destination.
      function buildIcon(s) {
        const t = THREAT[s.threatType] || THREAT.unknown;
        const color = t.color;
        const bearing = resolveBearing(s);
        const isAlert = s.status === 'alert';
        const count = Math.max(1, s.count || 1);
        const cap = 30;
        const n = Math.min(count, cap);
        const extra = count - n;

        // Shrink the glyphs as the swarm grows so the icon stays bounded.
        const scale = Math.max(0.42, 0.9 - n * 0.02);
        const glyphR = 7.8 * scale;
        const gap = glyphR * 2 + 1.5;

        const local = bearing !== null && n > 1
          ? wedgeLocal(n, gap, 6)
          : cloudLocal(n, gap);

        // Rotation is about the centre, so the bounding radius holds at any
        // bearing. Also track how far the formation's front reaches (toward -y).
        let Rmax = 0, frontY = 0;
        for (const [x, y] of local) {
          Rmax = Math.max(Rmax, Math.hypot(x, y));
          frontY = Math.max(frontY, -y);
        }
        Rmax += glyphR;
        const arrowLen = bearing !== null ? Math.min(24, Math.max(14, gap + 8)) : 0;
        const frontStart = bearing !== null ? frontY + glyphR + 2 : 0;
        const backPad = extra > 0 ? 14 : 0;
        const half = Math.ceil(Math.max(Rmax + backPad, frontStart + arrowLen) + 6);
        const VB = half * 2, C = half;

        // Drone glyphs.
        let glyphs = '';
        for (const [x, y] of local) {
          glyphs += threatGlyph(s.threatType, C + x, C + y, color, scale);
        }

        // Leading travel arrow, drawn in the same group so it rotates too.
        let arrow = '';
        if (bearing !== null) {
          const base = frontStart;
          const head = base + arrowLen - 6;
          const tip = base + arrowLen;
          arrow =
            `<line x1="${C}" y1="${C - base}" x2="${C}" y2="${C - head}" stroke="${color}" stroke-width="${Math.max(2.5, 3.4 * scale + 1)}" stroke-linecap="round"/>` +
            `<polygon points="${C},${C - tip} ${C - 6},${C - head + 1} ${C + 6},${C - head + 1}" fill="${color}"/>`;
        }

        const movingGroup = bearing !== null
          ? `<g transform="rotate(${bearing} ${C} ${C})">${arrow}${glyphs}</g>`
          : glyphs;

        // Pulse halo + alert ring sit unrotated behind the formation.
        const pulseColor = isAlert ? '#ff9f3d' : color;
        const pulse = `<circle class="pulse" cx="${C}" cy="${C}" r="${Math.min(Rmax, glyphR + 5)}" fill="${pulseColor}"/>`;
        const alertRing = isAlert
          ? `<circle class="pulse-alert" cx="${C}" cy="${C}" r="${Rmax + 2}" fill="none" stroke="#ff9f3d" stroke-width="2" opacity="0.75"/>`
          : '';

        // Overflow marker only when the swarm exceeds the render cap.
        const overflow = extra > 0
          ? `<text x="${C}" y="${C + Rmax + 9}" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#cde0f5">+${extra}</text>`
          : '';

        const svg =
          `<svg xmlns="http://www.w3.org/2000/svg" width="${VB}" height="${VB}" viewBox="0 0 ${VB} ${VB}">` +
          alertRing + pulse + movingGroup + overflow + `</svg>`;

        return L.divIcon({
          className: 'threat-icon',
          html: svg,
          iconSize: [VB, VB],
          iconAnchor: [C, C],
          popupAnchor: [0, -(Rmax + 4)],
        });
      }

      // A standalone arrowhead placed at the end of a direction line so the
      // projected path clearly points to where the threat is heading.
      function arrowheadIcon(bearing, color) {
        const svg =
          `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22">` +
          `<g transform="rotate(${bearing} 11 11)">` +
          `<polygon points="11,2 4,17 11,13 18,17" fill="${color}" stroke="#0d1b2a" stroke-width="1"/>` +
          `</g></svg>`;
        return L.divIcon({
          className: 'arrow-icon',
          html: svg,
          iconSize: [22, 22],
          iconAnchor: [11, 11],
        });
      }

      function popupHtml(s) {
        const t = THREAT[s.threatType] || THREAT.unknown;
        const bits = [t.label];
        if (s.count) bits.push('×' + s.count);
        if (s.status && s.status !== 'unknown') bits.push(s.status.replace('_', ' '));
        if (s.region) bits.push(s.region);
        const bearing = resolveBearing(s);

        // Resolve destination display text: explicit field > extracted from heading
        const destName = s.destination || extractDestFromHeading(s.heading);

        let going = '';
        if (destName) {
          going = `<div class="popup-dest">➤ Heading toward ${esc(destName)}</div>`;
        } else if (bearing !== null) {
          going = `<div class="popup-dest">➤ Heading ${esc(s.heading || bearingWord(bearing))}</div>`;
        }

        const alertBanner = s.status === 'alert'
          ? `<div class="popup-alert">⚠ Region alert active</div>`
          : '';

        return `
          <div class="popup-title">${esc(s.location)}</div>
          <div class="popup-meta">${esc(bits.join(' · '))} · ${fmtTime(s.timestamp)}</div>
          ${alertBanner}${going}
          ${s.postText ? `<div class="popup-text">${esc(s.postText)}</div>` : ''}
          ${s.postLink ? `<div class="popup-link"><a href="${esc(s.postLink)}" target="_blank" rel="noopener">Open in Telegram ↗</a></div>` : ''}
        `;
      }

      // dark tiles
      const map = L.map('map', { zoomControl: true }).setView([55.0, 40.0], 5);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19,
        attribution: '© <a href="https://www.openstreetmap.org/copyright" style="color:#5aafff">OpenStreetMap</a> © <a href="https://carto.com/attributions" style="color:#5aafff">CARTO</a>',
      }).addTo(map);

      document.addEventListener('DOMContentLoaded', () => {
        const style = document.createElement('style');
        style.textContent = `
          .leaflet-control-zoom a { background:#1a2d42!important; color:#cde0f5!important; border-color:#2d4a6a!important; }
          .leaflet-control-zoom a:hover { background:#243f5e!important; }
          .leaflet-control-attribution { background:rgba(13,27,42,0.7)!important; color:#8aa8c8!important; }
        `;
        document.head.appendChild(style);
      });

      const layer = L.layerGroup().addTo(map);

      async function load() {
        try {
          const res = await fetch('data/sightings.json?t=' + Date.now());
          const data = await res.json();
          const cutoff = Date.now() - ONE_HOUR_MS;

          const sightings = (data.sightings || []).filter((s) => {
            if (typeof s.lat !== 'number' || typeof s.lon !== 'number') return false;
            const t = Date.parse(s.timestamp || '');
            return t && t >= cutoff;
          });

          layer.clearLayers();
          const pts = [];
          let moving = 0;
          let alerts = 0;

          for (const s of sightings) {
            const bearing = resolveBearing(s);

            // Translucent alert circle for region-wide alerts
            if (s.status === 'alert') {
              alerts++;
              L.circle([s.lat, s.lon], {
                radius: 45000,
                color: '#ff9f3d',
                fillColor: '#ff9f3d',
                fillOpacity: 0.06,
                weight: 1,
                opacity: 0.3,
                dashArray: '5 5',
              }).addTo(layer);
            }

            // Direction line + arrowhead: 200 km along the computed bearing,
            // tipped with an arrow pointing where the threat is heading.
            if (bearing !== null) {
              moving++;
              const endPt = destPoint(s.lat, s.lon, bearing, 200);
              const color = (THREAT[s.threatType] || THREAT.unknown).color;
              L.polyline([[s.lat, s.lon], endPt], {
                color, weight: 2.5, opacity: 0.55, dashArray: '7 6',
              }).addTo(layer);
              L.marker(endPt, {
                icon: arrowheadIcon(bearing, color),
                interactive: false,
                keyboard: false,
              }).addTo(layer);
            } else if (s.destination || extractDestFromHeading(s.heading)) {
              // Has destination text but bearing not computed yet — count as moving
              moving++;
            }

            L.marker([s.lat, s.lon], { icon: buildIcon(s) })
              .bindPopup(popupHtml(s), { maxWidth: 280 })
              .addTo(layer);
            pts.push([s.lat, s.lon]);
          }

          if (pts.length) map.fitBounds(pts, { padding: [60, 60], maxZoom: 9 });

          const when = data.updatedAt ? fmtTime(data.updatedAt) : '—';
          let statusText;
          if (!sightings.length) {
            statusText = `no sightings in last hour · updated ${when}`;
          } else {
            const parts = [`${sightings.length} active`];
            if (moving) parts.push(`${moving} with direction`);
            if (alerts) parts.push(`${alerts} region alerts`);
            parts.push(when);
            statusText = parts.join(' · ');
          }
          document.getElementById('count').textContent = statusText;
        } catch {
          document.getElementById('count').textContent = 'failed to load';
        }
      }

      load();
      setInterval(load, 2 * 60 * 1000);
    </script>
  </body>
</html>
